name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency vulnerability scan
        id: trivy_vuln
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          hide-progress: true
          exit-code: "1"
          format: sarif
          output: trivy-dependencies.sarif

      - name: Upload dependency scan SARIF
        if: always() && hashFiles('trivy-dependencies.sarif') != ''
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          sarif_file: trivy-dependencies.sarif
          category: dependency-review

      - name: Fail if dependency scan detected high-risk vulnerabilities
        if: steps.trivy_vuln.outcome == 'failure'
        run: |
          echo "Dependency vulnerability scan detected one or more HIGH or CRITICAL issues."
          exit 1
